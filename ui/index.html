<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BIM House Database</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4f4f0;
      --card: #ffffff;
      --border: #e0e0d8;
      --text: #1a1a1a;
      --muted: #666;
      --accent: #2563eb;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: white;
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex; align-items: center; gap: 12px;
    }
    header h1 { font-size: 1.125rem; font-weight: 600; }
    header span { color: var(--muted); font-size: 0.8125rem; }

    .filters {
      background: white;
      border-bottom: 1px solid var(--border);
      padding: 10px 24px;
      display: flex; gap: 10px;
      flex-wrap: wrap; align-items: flex-end;
    }
    .filters label {
      font-size: 0.6875rem; color: var(--muted);
      display: flex; flex-direction: column; gap: 3px;
    }
    .filters select, .filters input {
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 5px 8px;
      font-size: 0.8125rem;
      background: white; color: var(--text);
      height: 30px;
    }
    .filters input[type=number] { width: 90px; }
    .filters input[type=text]   { width: 90px; }
    .filters button, .filters .reset {
      height: 30px; padding: 0 14px;
      border-radius: 5px; cursor: pointer; font-size: 0.8125rem;
    }
    .filters button { background: var(--accent); color: white; border: none; }
    .filters button:hover { background: #1d4ed8; }
    .filters .reset { background: white; color: var(--muted); border: 1px solid var(--border); }

    .results-bar { padding: 10px 24px 0; font-size: 0.8125rem; color: var(--muted); }

    /* ── stats dashboard (below filters, above grid) ─────────────── */
    .stats {
      background: white;
      border-bottom: 1px solid var(--border);
      padding: 16px 24px 18px;
    }
    .stats-tiles {
      display: flex; gap: 8px;
      padding-bottom: 14px;
      border-bottom: 1px dashed var(--border);
      margin-bottom: 12px;
    }
    .tile {
      display: flex; flex-direction: column; gap: 2px;
      min-width: 84px;
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: background .12s, box-shadow .12s, transform .08s;
      user-select: none;
    }
    .tile:hover { background: #f9fafb; }
    .tile:active { transform: translateY(1px); }
    .tile.active {
      background: #eef2ff;
      box-shadow: inset 0 0 0 1px #c7d2fe;
    }
    .tile .n {
      font-size: 1.55rem; font-weight: 600; color: var(--text);
      line-height: 1.05; letter-spacing: -.01em;
    }
    .tile .n.ok      { color: #15803d; }
    .tile .n.blocked { color: #b91c1c; }
    .tile .n.t34     { color: #5b21b6; }
    .tile .n.muted   { color: #6b7280; }
    .tile .lbl {
      font-size: 0.6875rem; color: var(--muted);
      text-transform: uppercase; letter-spacing: .04em;
      font-weight: 500;
    }
    .stats-rows {
      display: grid;
      grid-template-columns: 100px 1fr;
      gap: 6px 14px;
      font-size: 0.75rem;
      align-items: center;
    }
    .stats-rows .ax-lbl {
      color: var(--muted); text-align: right;
      font-weight: 500; letter-spacing: .01em;
    }
    .stats-rows .ax-lbl.has-filter {
      color: var(--accent); font-weight: 600;
    }
    .bar {
      display: flex; height: 16px;
      border-radius: 4px; overflow: hidden;
      background: #f3f4f6;
    }
    .bar-seg {
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 0.6rem; font-weight: 600;
      min-width: 0; padding: 0 4px;
      white-space: nowrap; overflow: hidden;
      transition: opacity .15s, filter .12s;
      cursor: pointer;
      opacity: 0.95;
    }
    .bar-seg:hover { filter: brightness(1.12); opacity: 1; }
    .bar.has-filter .bar-seg:not(.active) { opacity: 0.25; cursor: pointer; }
    .bar.has-filter .bar-seg.active {
      opacity: 1;
      box-shadow: inset 0 0 0 2px rgba(0,0,0,.18);
    }
    .bar-seg.unset { color: #6b7280; cursor: default; }
    .bar-seg.unset:hover { filter: none; opacity: 0.95; }
    .bar-legend {
      grid-column: 2;
      display: flex; flex-wrap: wrap; gap: 4px 0;
      font-size: 0.6875rem; color: var(--muted);
      margin-top: -2px; margin-bottom: 4px;
    }
    .bar-legend .leg-item {
      display: inline-flex; align-items: center;
      padding: 1px 8px 1px 4px;
      margin-right: 4px;
      border-radius: 99px;
      cursor: pointer;
      transition: background .12s;
      user-select: none;
    }
    .bar-legend .leg-item:hover { background: #f3f4f6; }
    .bar-legend .leg-item.active {
      background: #eef2ff; color: var(--text); font-weight: 600;
    }
    .bar-legend .leg-item.dim { opacity: 0.45; }
    .bar-legend .swatch {
      display: inline-block; width: 8px; height: 8px;
      border-radius: 2px; margin-right: 6px;
    }
    .bar-legend strong { color: var(--text); font-weight: 600; margin-left: 4px; }
    .bar-legend .leg-more { color: var(--muted); padding: 1px 6px; font-style: italic; }
    .ax-clear {
      grid-column: 1; text-align: right; padding-right: 4px;
      font-size: 0.6875rem; color: var(--accent);
      cursor: pointer; user-select: none;
    }
    .ax-clear:hover { text-decoration: underline; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px; padding: 12px 24px 24px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden; cursor: pointer;
      transition: box-shadow .15s, transform .1s;
      position: relative;
    }
    .card:hover { box-shadow: 0 4px 14px rgba(0,0,0,.1); transform: translateY(-1px); }
    .card-img { width: 100%; aspect-ratio: 4/3; object-fit: cover; display: block; }
    /* Hand-drawn scans / drawings are portrait-page artefacts — show the
       whole page rather than crop the middle out. */
    .card-img.medium-scan, .card-img.medium-drawing { object-fit: contain; background: #fafaf5; padding: 6px; }
    .card-no-img {
      width: 100%; aspect-ratio: 4/3; background: #eee;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted); font-size: 0.75rem;
    }
    .card-body { padding: 11px 13px; }
    .card-mfr  { font-size: 0.6875rem; color: var(--muted); margin-bottom: 1px; }
    .card-name { font-weight: 600; font-size: 0.9375rem; margin-bottom: 6px; }
    .card-specs { display: flex; gap: 12px; font-size: 0.75rem; color: var(--muted); margin-bottom: 6px; flex-wrap: wrap; }
    .card-price { font-weight: 600; font-size: 0.9rem; }
    .badges { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 8px; }
    .badge { font-size: 0.625rem; padding: 2px 7px; border-radius: 99px; font-weight: 500; }
    .b-type   { background: #f3f4f6; color: #374151; }
    .b-fertig { background: #dbeafe; color: #1d4ed8; }
    .b-massiv { background: #dcfce7; color: #15803d; }
    .b-block  { background: #fef3c7; color: #92400e; }
    .b-roof   { background: #ede9fe; color: #6d28d9; }
    .b-style  { background: #ffe4e6; color: #be123c; }
    .b-ok     { background: #dcfce7; color: #15803d; }
    .b-blocked{ background: #fee2e2; color: #b91c1c; }
    .b-unknown{ background: #f3f4f6; color: #6b7280; }
    .b-tier-0 { background: #f3f4f6; color: #6b7280; }
    .b-tier-1 { background: #fef3c7; color: #92400e; }
    .b-tier-2 { background: #dbeafe; color: #1d4ed8; }
    .b-tier-3 { background: #dcfce7; color: #15803d; }
    .b-tier-4 { background: #ddd6fe; color: #5b21b6; }
    .card-tier {
      position: absolute; top: 8px; left: 8px;
      font-size: 0.625rem; font-weight: 700;
      padding: 3px 7px; border-radius: 99px;
      box-shadow: 0 1px 3px rgba(0,0,0,.1);
    }
    .card-modelable {
      position: absolute; top: 8px; right: 8px;
      font-size: 0.625rem; font-weight: 700; letter-spacing: .04em;
      padding: 3px 8px; border-radius: 99px;
      box-shadow: 0 1px 3px rgba(0,0,0,.1);
    }

    /* Modal */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 100; overflow-y: auto; padding: 40px 16px; }
    .overlay.open { display: flex; align-items: flex-start; justify-content: center; }
    .modal { background: white; border-radius: 12px; width: 100%; max-width: 900px; overflow: hidden; }
    .modal-hdr { display: flex; justify-content: space-between; align-items: flex-start; padding: 18px 22px; border-bottom: 1px solid var(--border); }
    .modal-hdr h2 { font-size: 1.2rem; }
    .modal-hdr .mfr { font-size: 0.75rem; color: var(--muted); margin-bottom: 2px; }
    .close-btn { background: none; border: none; font-size: 1.6rem; cursor: pointer; color: var(--muted); line-height: 1; padding: 0 4px; }

    .gallery { display: grid; gap: 2px; background: #000; }
    .gallery.g1 { grid-template-columns: 1fr; }
    .gallery.g2 { grid-template-columns: 1fr 1fr; }
    .gallery .gal-tile { position: relative; }
    .gallery img { width: 100%; object-fit: cover; display: block; }
    .gallery.g1 img { max-height: 380px; }
    .gallery.g2 img { max-height: 260px; }
    .gallery.has-scan { background: #fafaf5; }
    .gallery img.medium-scan, .gallery img.medium-drawing { object-fit: contain; background: #fff; }
    .gal-badge { position: absolute; bottom: 6px; left: 6px; background: rgba(0,0,0,.55); color: white; font-size: .65rem; padding: 2px 6px; border-radius: 4px; }

    .modal-body { padding: 18px 22px; }
    .spec-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .spec-table tr { border-bottom: 1px solid var(--border); }
    .spec-table td { padding: 7px 0; vertical-align: top; }
    .spec-table td:first-child { color: var(--muted); width: 30%; }
    .spec-table td:last-child  { font-weight: 500; }

    .modal-actions { display: flex; gap: 9px; margin-top: 15px; flex-wrap: wrap; }
    .btn { padding: 7px 16px; border-radius: 6px; font-size: 0.8125rem; text-decoration: none; cursor: pointer; display: inline-block; }
    .btn-primary   { background: var(--accent); color: white; border: none; }
    .btn-secondary { background: white; color: var(--text); border: 1px solid var(--border); }
    .btn:hover { opacity: .88; }

    .img-section { margin-top: 18px; border-top: 1px solid var(--border); padding-top: 14px; }
    .img-section h4 { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 9px; }
    .img-section h5 { font-size: 0.75rem; color: var(--text); margin: 12px 0 6px; font-weight: 600; }
    .img-grid { display: flex; gap: 8px; flex-wrap: wrap; }
    .img-tile { position: relative; display: block; }
    .img-tile img { height: 130px; border-radius: 4px; border: 1px solid var(--border); cursor: zoom-in; background: #fff; display: block; }
    .img-tile .cap {
      position: absolute; bottom: 4px; left: 4px; right: 4px;
      background: rgba(0,0,0,.55); color: white; font-size: .6rem;
      padding: 2px 5px; border-radius: 3px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
  </style>
</head>
<body>

<header>
  <h1>BIM House Database</h1>
  <span id="hdr-count"></span>
</header>

<div class="filters" id="filters">
  <!-- populated from /ontology at load -->
  <button onclick="load()">Filtern</button>
  <button class="reset" onclick="resetFilters()">Reset</button>
</div>

<div class="stats" id="stats"></div>
<div class="results-bar" id="results-bar"></div>
<div class="grid" id="grid"></div>

<div class="overlay" id="overlay" onclick="maybeClose(event)">
  <div class="modal">
    <div class="modal-hdr">
      <div>
        <div class="mfr" id="m-mfr"></div>
        <h2 id="m-name"></h2>
      </div>
      <button class="close-btn" onclick="closeModal()">×</button>
    </div>
    <div class="gallery" id="m-gallery"></div>
    <div class="modal-body">
      <table class="spec-table" id="m-specs"></table>
      <div class="modal-actions" id="m-actions"></div>
      <div class="img-section" id="m-images" style="display:none">
        <h4>Bilder</h4>
        <div id="m-image-groups"></div>
      </div>
      <div class="img-section" id="m-modelable" style="display:none">
        <h4>bim-ai Modellierbarkeit</h4>
        <div id="m-modelable-body"></div>
      </div>
      <div class="img-section" id="m-source-pdfs" style="display:none">
        <h4>Source PDFs</h4>
        <div class="img-grid" id="m-source-pdf-list"></div>
      </div>
    </div>
  </div>
</div>

<script>
let ONTOLOGY = null;

// ── helpers ────────────────────────────────────────────────────────────────
const fmt = (n, suf='') => n != null ? n.toLocaleString('de-DE') + suf : '–';
function fmtPrice(h) {
  if (h.price_on_request) return 'Preis auf Anfrage';
  return h.price_eur != null ? '€ ' + h.price_eur.toLocaleString('de-DE') : null;
}
function bClass(c) {
  if (!c) return 'b-type';
  const l = c.toLowerCase();
  if (l.includes('fertig')) return 'b-fertig';
  if (l.includes('massiv')) return 'b-massiv';
  if (l.includes('block'))  return 'b-block';
  return 'b-type';
}
function esc(s) { return (s ?? '').toString().replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function ontoLabel(group, key) {
  return ONTOLOGY?.[group]?.[key] || key;
}
function modelableTitle(h) {
  if (h.modelable_in_bim_ai === true)  return 'bim-ai can model this house today';
  if (h.modelable_in_bim_ai === false) return 'Blocked: ' + (h.blocking_open || []).map(b => b.ref).join(', ');
  return 'Unknown — refresh issue-state cache (`make refresh-issue-state`)';
}
function tierBadge(h) {
  const t = h.reconstructability_tier;
  if (!t) return '';
  const n = parseInt(t.replace(/^T/, ''));
  const label = `T${n}`;
  const full = ontoLabel('reconstructability_tiers', t);
  return `<span class="card-tier badge b-tier-${n}" title="${esc(full)}">${label}</span>`;
}

// ── filter rendering (driven by ontology) ──────────────────────────────────
const FILTER_DEFS = [
  ['source',          'Quelle',         'sources'],
  ['building_type',   'Gebäudetyp',     'building_types'],
  ['construction',    'Bauweise',       'constructions'],
  ['roof_type',       'Dachform',       'roof_types'],
  ['style',           'Stil',           'styles'],
];

function buildFilters() {
  const root = document.getElementById('filters');
  const dropdowns = FILTER_DEFS.map(([field, label, group]) => {
    const opts = Object.entries(ONTOLOGY[group] || {})
      .map(([k, lbl]) => `<option value="${esc(k)}">${esc(lbl)}</option>`).join('');
    return `<label>${label}
      <select id="f-${field}"><option value="">Alle</option>${opts}</select>
    </label>`;
  }).join('');
  const numeric = `
    <label>bim-ai
      <select id="f-modelable_in_bim_ai">
        <option value="">egal</option>
        <option value="true">✓ modellierbar</option>
        <option value="false">✗ blockiert</option>
      </select>
    </label>
    <label>min. Tier
      <select id="f-min_tier">
        <option value="">egal</option>
        <option value="T1">≥ T1 schematisch</option>
        <option value="T2">≥ T2 vermaßt</option>
        <option value="T3">≥ T3 Architekten-Satz</option>
        <option value="T4">T4 Werkplan</option>
      </select>
    </label>
    <label>Keller<select id="f-has_basement"><option value="">egal</option><option value="true">mit</option><option value="false">ohne</option></select></label>
    <label>Fläche min (m²)<input type="number" id="f-min_area" placeholder="–"></label>
    <label>Fläche max (m²)<input type="number" id="f-max_area" placeholder="–"></label>
    <label>Max. Preis (€)<input type="number" id="f-max_price" placeholder="–"></label>
    <label>Baujahr ab<input type="number" id="f-min_year" placeholder="–"></label>
    <label>Baujahr bis<input type="number" id="f-max_year" placeholder="–"></label>
    <label>Energie<input type="text" id="f-energy_standard" placeholder="z.B. 40, 55"></label>`;
  // insert before the two action buttons
  const btns = root.innerHTML;
  root.innerHTML = dropdowns + numeric + btns;
  root.querySelectorAll('input, select').forEach(el =>
    el.addEventListener('keydown', e => { if (e.key === 'Enter') load(); }));
}

function resetFilters() {
  document.querySelectorAll('.filters input, .filters select').forEach(el => el.value = '');
  load();
}

// ── card ───────────────────────────────────────────────────────────────────
function pickThumbnail(h) {
  // Prefer an exterior; fall back to elevation, perspective, anything visual.
  const order = ['exterior', 'elevation', 'perspective', 'interior', 'detail', 'floorplan', 'section'];
  const rank = c => { const i = order.indexOf(c); return i < 0 ? 999 : i; };
  const sorted = [...(h.images || [])].sort((a, b) => rank(a.category) - rank(b.category));
  return sorted[0] || null;
}
function renderCard(h) {
  const thumb = pickThumbnail(h);
  const img = thumb
    ? `<img class="card-img medium-${thumb.medium}" src="${thumb.url}" loading="lazy"
            onerror="this.parentNode.innerHTML='<div class=card-no-img>Kein Bild</div>'">`
    : `<div class="card-no-img">Kein Bild</div>`;
  const specs = [
    h.area_m2 != null ? `${fmt(h.area_m2, ' m²')}` : null,
    h.rooms != null ? `${h.rooms} Zi.` : null,
    h.floors != null ? `${h.floors} Gesch.` : (h.levels ? `${h.levels.length} Gesch.` : null),
    h.year_built != null ? `Bj. ${h.year_built}` : null,
  ].filter(Boolean);
  const price = fmtPrice(h);
  const m = h.modelable_in_bim_ai;
  // Don't show a badge for not-yet-assessed houses — the absence is itself
  // the signal. We only render a badge once the house has been looked at.
  const showBadge = h.assessed === true;
  const mLabel = m === true ? 'BIM-AI ✓' : m === false ? 'BIM-AI ✗' : 'BIM-AI ?';
  const mClass = m === true ? 'b-ok'   : m === false ? 'b-blocked' : 'b-unknown';
  return `
    <div class="card" onclick="openModal('${h.key}')">
      ${showBadge ? `<span class="card-modelable badge ${mClass}" title="${esc(modelableTitle(h))}">${mLabel}</span>` : ''}
      ${tierBadge(h)}
      ${img}
      <div class="card-body">
        <div class="card-mfr">${esc(h.manufacturer ?? '–')}</div>
        <div class="card-name">${esc(h.model)}</div>
        ${specs.length ? `<div class="card-specs">${specs.map(s => `<span>${esc(s)}</span>`).join('')}</div>` : ''}
        ${price ? `<div class="card-price">${esc(price)}</div>` : ''}
        <div class="badges">
          ${h.building_type ? `<span class="badge b-type">${esc(h.building_type)}</span>` : ''}
          ${h.construction  ? `<span class="badge ${bClass(h.construction)}">${esc(h.construction)}</span>` : ''}
          ${h.roof_type     ? `<span class="badge b-roof">${esc(h.roof_type)}</span>` : ''}
          ${h.style         ? `<span class="badge b-style">${esc(ontoLabel('styles', h.style))}</span>` : ''}
        </div>
      </div>
    </div>`;
}

// ── load ───────────────────────────────────────────────────────────────────
// ── stats dashboard ────────────────────────────────────────────────────────
// Distinct, slightly muted palettes per axis — color reserved for state.
const PALETTES = {
  source:        ['#1d4ed8','#92400e'],                                              // catalog, documentation
  building_type: ['#1d4ed8','#15803d','#6d28d9','#b45309','#be123c','#0891b2','#65a30d','#7c2d12','#0e7490','#7e22ce','#a16207','#9d174d','#374151'],
  construction:  ['#1d4ed8','#15803d','#b45309','#6d28d9','#be123c','#0891b2'],
  roof_type:     ['#6d28d9','#0891b2','#7c3aed','#9333ea','#a855f7','#7e22ce','#5b21b6','#4c1d95','#312e81','#1e1b4b'],
  style:         ['#be123c','#dc2626','#9d174d','#7c2d12','#9a3412','#831843','#0e7490','#a16207','#374151'],
  tier:          ['#9ca3af','#fbbf24','#3b82f6','#22c55e','#a855f7'],                // T0…T4
};

// ── interaction wiring ─────────────────────────────────────────────────────
// Set / toggle a filter dropdown and trigger reload. Toggle: clicking the
// already-active value clears the filter.
function setFilter(filterId, value) {
  const el = document.getElementById(filterId);
  if (!el) return;
  el.value = el.value === String(value) ? '' : String(value);
  load();
}
function clearFilter(filterId) {
  const el = document.getElementById(filterId);
  if (el) { el.value = ''; load(); }
}

// Single delegated click handler — looks for data-action attributes on
// any element under the stats panel. Avoids the inline-onclick + nested-
// quotes mess that broke segment/legend clicks earlier.
document.addEventListener('click', (e) => {
  const action = e.target.closest('[data-action]');
  if (!action) return;
  const a = action.dataset.action;
  if (a === 'set-filter')   setFilter(action.dataset.filterId, action.dataset.filterValue);
  else if (a === 'clear-filter') clearFilter(action.dataset.filterId);
  else if (a === 'reset')   resetFilters();
});

// ── bar renderer ───────────────────────────────────────────────────────────
// Tier semantics differ from other axes: the filter is a *minimum*, so
// clicking T2 means "T2 and above". These helpers normalize that.
const _tierNum = s => s ? parseInt(String(s).replace(/^T/, '').split('_')[0]) : null;
const _tierFilterValue = k => `T${_tierNum(k)}`;
function _matchesActive(filterId, key, activeVal) {
  if (!activeVal || key == null) return false;
  if (filterId === 'f-min_tier') {
    const a = _tierNum(activeVal), b = _tierNum(key);
    return a != null && b != null && b >= a;
  }
  return key === activeVal;
}
function _toFilterValue(filterId, key) {
  return filterId === 'f-min_tier' ? _tierFilterValue(key) : key;
}

function makeBar(label, counts, palette, ontologyGroup, total, filterId) {
  const sum = counts.reduce((a, [, n]) => a + n, 0);
  const missing = total - sum;
  const items = counts.map(([k, n], i) => [k, n, palette[i % palette.length]]);
  if (missing > 0) items.push([null, missing, '#e5e7eb']);

  const activeVal = document.getElementById(filterId)?.value || '';
  const hasFilter = activeVal !== '';

  const segs = items.map(([k, n, col]) => {
    const pct = (n / total * 100).toFixed(1);
    const lbl = k ? (ONTOLOGY?.[ontologyGroup]?.[k] || k) : 'unbekannt';
    const text = n / total > 0.06 ? n : '';
    const isActive = _matchesActive(filterId, k, activeVal);
    const unsetCls = k ? '' : ' unset';
    const activeCls = isActive ? ' active' : '';
    const dataAttrs = k
      ? `data-action="set-filter" data-filter-id="${filterId}" data-filter-value="${esc(_toFilterValue(filterId, k))}"`
      : '';
    return `<div class="bar-seg${unsetCls}${activeCls}" ${dataAttrs}
                 style="flex:${n} 1 0;background:${col};color:${k ? 'white' : '#6b7280'}"
                 title="${esc(lbl)}: ${n} (${pct}%)">${text}</div>`;
  }).join('');

  const legendItems = counts.slice(0, 6).map(([k, n], i) => {
    const lbl = ONTOLOGY?.[ontologyGroup]?.[k] || k;
    const isActive = _matchesActive(filterId, k, activeVal);
    const cls = isActive ? 'leg-item active' : (hasFilter ? 'leg-item dim' : 'leg-item');
    return `<span class="${cls}" data-action="set-filter"
                  data-filter-id="${filterId}" data-filter-value="${esc(_toFilterValue(filterId, k))}">
              <span class="swatch" style="background:${palette[i % palette.length]}"></span>${esc(lbl)} <strong>${n}</strong>
            </span>`;
  }).join('');
  const tail = counts.length > 6 ? `<span class="leg-more">… +${counts.length - 6}</span>` : '';

  const lblCls = hasFilter ? 'ax-lbl has-filter' : 'ax-lbl';
  const lblHtml = hasFilter
    ? `<div class="${lblCls}">${label} · <span class="ax-clear" data-action="clear-filter" data-filter-id="${filterId}">×</span></div>`
    : `<div class="${lblCls}">${label}</div>`;

  return `
    ${lblHtml}
    <div class="bar${hasFilter ? ' has-filter' : ''}">${segs}</div>
    <div class="bar-legend">${legendItems}${tail}</div>`;
}

function renderStats(recs) {
  const n = recs.length;
  const mod = recs.filter(r => r.modelable_in_bim_ai === true).length;
  const blk = recs.filter(r => r.modelable_in_bim_ai === false).length;
  const t34 = recs.filter(r => {
    const t = r.reconstructability_tier;
    return t && parseInt(t.replace(/^T/, '')) >= 3;
  }).length;
  const t2 = recs.filter(r => r.reconstructability_tier === 'T2_dimensioned_plans').length;

  const group = (field) => {
    const m = new Map();
    for (const r of recs) {
      const v = r[field];
      if (v) m.set(v, (m.get(v) || 0) + 1);
    }
    return [...m.entries()].sort((a, b) => b[1] - a[1]);
  };
  const groupTier = () => {
    const m = new Map();
    for (const r of recs) {
      const t = r.reconstructability_tier;
      if (t) m.set(t, (m.get(t) || 0) + 1);
    }
    return [...m.entries()].sort(
      (a, b) => parseInt(a[0].replace(/^T/, '')) - parseInt(b[0].replace(/^T/, ''))
    );
  };

  // Tile active states derived from current filter values
  const fMod = document.getElementById('f-modelable_in_bim_ai')?.value || '';
  const fTier = document.getElementById('f-min_tier')?.value || '';
  const anyFilter = Array.from(document.querySelectorAll('.filters input, .filters select'))
    .some(el => el.value !== '');

  const tiles = `
    <div class="stats-tiles">
      <div class="tile ${anyFilter ? '' : 'active'}" data-action="reset" title="Alle Filter zurücksetzen">
        <span class="n">${n}</span><span class="lbl">Häuser</span>
      </div>
      <div class="tile ${fMod === 'true' ? 'active' : ''}" data-action="set-filter"
           data-filter-id="f-modelable_in_bim_ai" data-filter-value="true">
        <span class="n ok">${mod}</span><span class="lbl">✓ modellierbar</span>
      </div>
      <div class="tile ${fMod === 'false' ? 'active' : ''}" data-action="set-filter"
           data-filter-id="f-modelable_in_bim_ai" data-filter-value="false">
        <span class="n blocked">${blk}</span><span class="lbl">✗ blockiert</span>
      </div>
      <div class="tile ${fTier === 'T3' ? 'active' : ''}" data-action="set-filter"
           data-filter-id="f-min_tier" data-filter-value="T3">
        <span class="n t34">${t34}</span><span class="lbl">T3+ Fidelity</span>
      </div>
      <div class="tile ${fTier === 'T2' ? 'active' : ''}" data-action="set-filter"
           data-filter-id="f-min_tier" data-filter-value="T2">
        <span class="n muted">${t2}</span><span class="lbl">T2 (Katalog)</span>
      </div>
    </div>`;

  const rows = `
    <div class="stats-rows">
      ${makeBar('Quelle',       group('source'),        PALETTES.source,        'sources',        n, 'f-source')}
      ${makeBar('Gebäudetyp',   group('building_type'), PALETTES.building_type, 'building_types', n, 'f-building_type')}
      ${makeBar('Bauweise',     group('construction'),  PALETTES.construction,  'constructions',  n, 'f-construction')}
      ${makeBar('Dachform',     group('roof_type'),     PALETTES.roof_type,     'roof_types',     n, 'f-roof_type')}
      ${makeBar('Stil',         group('style'),         PALETTES.style,         'styles',         n, 'f-style')}
      ${makeBar('Tier',         groupTier(),            PALETTES.tier,          'reconstructability_tiers', n, 'f-min_tier')}
    </div>`;

  document.getElementById('stats').innerHTML = tiles + rows;
}

async function load() {
  const p = new URLSearchParams();
  document.querySelectorAll('.filters input, .filters select').forEach(el => {
    const id = el.id.replace(/^f-/, '');
    if (el.value !== '') p.set(id, el.value);
  });
  const recs = await fetch(`/houses?${p}`).then(r => r.json());
  document.getElementById('hdr-count').textContent = `${recs.length} Häuser`;
  document.getElementById('results-bar').textContent = `${recs.length} ${recs.length === 1 ? 'Eintrag' : 'Einträge'} gefunden`;
  renderStats(recs);
  document.getElementById('grid').innerHTML = recs.map(renderCard).join('');
}

// ── modal ──────────────────────────────────────────────────────────────────
const cache = {};
async function openModal(key) {
  if (!cache[key]) cache[key] = await fetch(`/houses/${key}`).then(r => r.json());
  const h = cache[key];

  document.getElementById('m-mfr').textContent  = h.manufacturer ? `${h.manufacturer} · ${h.key}` : h.key;
  document.getElementById('m-name').textContent = h.model;

  // Gallery: pick top 2 by category preference
  const order = ['exterior', 'elevation', 'perspective', 'interior'];
  const rankH = c => { const i = order.indexOf(c); return i < 0 ? 999 : i; };
  const heroImages = [...(h.images || [])]
    .filter(i => order.includes(i.category))
    .sort((a,b) => rankH(a.category) - rankH(b.category))
    .slice(0, 2);
  const hasScan = heroImages.some(i => i.medium === 'scan' || i.medium === 'drawing');
  const gEl = document.getElementById('m-gallery');
  gEl.className = 'gallery g' + (heroImages.length || 1) + (hasScan ? ' has-scan' : '');
  gEl.innerHTML = heroImages.length
    ? heroImages.map(i => `<div class="gal-tile">
        <img class="medium-${i.medium}" src="${i.url}" loading="lazy">
        <span class="gal-badge">${esc(ontoLabel('image_mediums', i.medium))}${i.view ? ' · ' + esc(ontoLabel('image_views', i.view)) : ''}</span>
      </div>`).join('')
    : `<div class="card-no-img">Kein Bild</div>`;

  // Specs — only fields that have a value
  const rows = [
    ['Hersteller',       h.manufacturer],
    ['Modell',           h.model],
    ['Quelle',           h.source && ontoLabel('sources', h.source)],
    ['Gebäudetyp',       h.building_type],
    ['Bauweise',         h.construction],
    ['Dachform',         h.roof_type],
    ['Stil',             h.style && ontoLabel('styles', h.style)],
    ['Baujahr',          h.year_built],
    ['Keller',           h.has_basement == null ? null : (h.has_basement ? 'ja' : 'nein')],
    ['Geschosse',        h.levels?.join(' → ') ?? h.floors],
    ['Wohnfläche',       h.area_m2 != null ? fmt(h.area_m2, ' m²') : null],
    ['Zimmer',           h.rooms],
    ['Energiestandard',  h.energy_standard],
    ['Preis',            fmtPrice(h)],
    ['Lage / Standort',  h.site],
    ['Charakter',        h.character],
    ['Agent notes',      h.agent_notes],
    ['Rekonstruierbarkeit', h.reconstructability_tier && ontoLabel('reconstructability_tiers', h.reconstructability_tier)],
    ['Grundriss-Qualität', h.data_quality && ontoLabel('floorplan_grades', h.data_quality.floorplan_grade)],
    ['Außenansicht-Abdeckung', h.data_quality && ontoLabel('exterior_coverages', h.data_quality.exterior_coverage)],
    ['Ansichten',        h.data_quality && ontoLabel('elevation_sets', h.data_quality.elevation_set)],
    ['Schnitt',          h.data_quality && ontoLabel('section_drawings', h.data_quality.section_drawing)],
    ['Bau-Spezifikation', h.data_quality && ontoLabel('construction_specs_grades', h.data_quality.construction_specs)],
  ].filter(([, v]) => v != null && v !== '');
  document.getElementById('m-specs').innerHTML =
    rows.map(([k,v]) => `<tr><td>${k}</td><td>${esc(v)}</td></tr>`).join('');

  // Actions
  const acts = document.getElementById('m-actions');
  acts.innerHTML = '';
  if (h.source_url) acts.innerHTML += `<a class="btn btn-secondary" href="${esc(h.source_url)}" target="_blank">Quelle ↗</a>`;
  if (h.pdf_url)    acts.innerHTML += `<a class="btn btn-primary"   href="${esc(h.pdf_url)}"    target="_blank">PDF öffnen</a>`;

  // Images grouped by category, then by floor for floorplans
  const groups = {};
  for (const i of (h.images || [])) {
    (groups[i.category] ||= []).push(i);
  }
  const groupOrder = ['exterior','elevation','interior','perspective','floorplan','section','roof_plan','detail','site_plan'];
  const sortedCats = Object.keys(groups).sort((a,b) => {
    const ai = groupOrder.indexOf(a), bi = groupOrder.indexOf(b);
    return (ai < 0 ? 999 : ai) - (bi < 0 ? 999 : bi);
  });
  const imgSec = document.getElementById('m-images');
  const imgRoot = document.getElementById('m-image-groups');
  if (sortedCats.length) {
    imgSec.style.display = '';
    imgRoot.innerHTML = sortedCats.map(cat => {
      let list = groups[cat];
      // For floorplans, group by floor in ontology order
      if (cat === 'floorplan') {
        const floorOrder = Object.keys(ONTOLOGY.levels || {});
        list = [...list].sort((a,b) => {
          const ai = floorOrder.indexOf(a.floor), bi = floorOrder.indexOf(b.floor);
          return (ai < 0 ? 999 : ai) - (bi < 0 ? 999 : bi);
        });
      }
      const tiles = list.map(i => {
        const cap = i.caption || [i.floor && ontoLabel('levels', i.floor), i.view && ontoLabel('image_views', i.view)].filter(Boolean).join(' · ');
        return `<a class="img-tile" href="${esc(i.url)}" target="_blank">
          <img class="medium-${i.medium}" src="${esc(i.url)}">
          ${cap ? `<span class="cap">${esc(cap)}</span>` : ''}
        </a>`;
      }).join('');
      return `<h5>${esc(ontoLabel('image_categories', cat))} <span style="color:var(--muted);font-weight:400">(${list.length})</span></h5>
              <div class="img-grid">${tiles}</div>`;
    }).join('');
  } else {
    imgSec.style.display = 'none';
  }

  // bim-ai modelability
  const mSec = document.getElementById('m-modelable');
  const refs = (h.bim_ai_blocking_issues || []);
  if (refs.length || h.modelable_in_bim_ai === false || h.modelable_in_bim_ai === null) {
    mSec.style.display = '';
    const m = h.modelable_in_bim_ai;
    const headline = m === true
      ? `<span class="badge b-ok">✓ modellierbar</span> Keine offenen Blocker.`
      : m === false
        ? `<span class="badge b-blocked">✗ blockiert</span> Mindestens ein referenziertes Issue ist noch offen.`
        : `<span class="badge b-unknown">? unbekannt</span> Cache fehlt für mindestens ein Issue – <code>make refresh-issue-state</code> ausführen.`;
    const issueLinks = refs.length
      ? `<ul style="margin-top:8px;padding-left:18px;font-size:.85rem">${refs.map(r => {
            const open = (h.blocking_open || []).some(b => b.ref === r);
            const unknown = (h.blocking_unknown || []).some(b => b.ref === r);
            const state = open ? '🟠 open' : unknown ? '⚪ unknown' : '🟢 closed';
            return `<li>${state} · <a href="https://github.com/${esc(r.split('#')[0])}/issues/${esc(r.split('#')[1])}" target="_blank"><code>${esc(r)}</code></a></li>`;
        }).join('')}</ul>`
      : '';
    document.getElementById('m-modelable-body').innerHTML = `<div style="font-size:.85rem">${headline}</div>${issueLinks}`;
  } else {
    mSec.style.display = '';
    document.getElementById('m-modelable-body').innerHTML =
      `<div style="font-size:.85rem"><span class="badge b-ok">✓ modellierbar</span> Keine offenen Blocker.</div>`;
  }

  // Source PDFs
  const src = h.source_pdfs || [];
  const srcSec = document.getElementById('m-source-pdfs');
  srcSec.style.display = src.length ? '' : 'none';
  document.getElementById('m-source-pdf-list').innerHTML =
    src.map(s => `<a href="${esc(s)}" target="_blank" class="btn btn-secondary" style="height:auto;padding:5px 10px;font-size:.7rem">${esc(s.split('/').pop())}</a>`).join('');

  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}
function maybeClose(e) { if (e.target === document.getElementById('overlay')) closeModal(); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── bootstrap ──────────────────────────────────────────────────────────────
(async () => {
  ONTOLOGY = await fetch('/ontology').then(r => r.json());
  buildFilters();
  await load();
})();
</script>
</body>
</html>
